<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJ-XInetic Sumo Tuner</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='110' fill='%230b0d19'/><circle cx='256' cy='235' r='170' fill='none' stroke='%2300ffcc' stroke-width='4' stroke-dasharray='15 8'/><text x='256' y='270' font-family='sans-serif' font-size='90' font-weight='900' fill='%23ff5e00' text-anchor='middle'>TJX</text><text x='256' y='460' font-family='sans-serif' font-size='28' font-weight='900' letter-spacing='6' fill='%23ffffff' text-anchor='middle'>TJ-XInetic</text></svg>">

    <style>
        :root {
            --bg-main: #0b0d19;
            --bg-card: #141829;
            --accent-orange: #ff5e00;
            --accent-cyan: #00ffcc;
            --text-light: #ffffff;
            --text-dark: #858da3;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-light); 
            padding: 20px; 
            margin: 0;
            max-width: 500px;
            margin: 0 auto;
            text-align: center; 
            padding-bottom: 40px;
        }

        h1 { font-size: 26px; font-weight: 900; margin-bottom: 2px; color: var(--text-light); letter-spacing: 1px; }
        .branding-sub { font-size: 11px; font-weight: 700; color: var(--accent-cyan); letter-spacing: 4px; margin-bottom: 25px; text-transform: uppercase; }

        .card { 
            background: var(--bg-card); 
            padding: 22px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
            border: 1px solid #1f253d;
            text-align: left;
        }
        .card h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dark); border-bottom: 1px solid #1f253d; padding-bottom: 8px;}

        button { 
            background: #007aff; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            font-size: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin: 6px 0; 
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.save { background: #34c759; box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2); }
        button.connect { background: var(--accent-orange); box-shadow: 0 4px 12px rgba(255, 94, 0, 0.2); margin-bottom: 20px; }

        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .telemetry-block { background: #0b0d19; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #1f253d; }
        .telemetry-block .label { font-size: 11px; color: var(--text-dark); text-transform: uppercase; }
        .telemetry-block .val { font-size: 20px; font-weight: bold; font-family: monospace; margin-top: 4px; color: var(--accent-cyan); }

        .slider-group { margin: 20px 0 10px 0; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; color: #b0b5c4; margin-bottom: 6px; }
        .slider-header .val { color: #007aff; font-weight: bold; font-family: monospace; }
        input[type=range] { width: 100%; height: 7px; border-radius: 5px; background: #242b47; accent-color: #007aff; outline: none; margin: 0; }

        #console { 
            background: #05060f; 
            font-family: 'Courier New', monospace; 
            padding: 12px; 
            border-radius: 8px; 
            min-height: 48px; 
            max-height: 80px; 
            overflow-y: auto; 
            color: #34c759; 
            font-size: 13px; 
            border: 1px solid #1f253d;
            line-height: 1.4;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <h1>TJ-XInetic</h1>
    <div class="branding-sub">Sumo Core Systems</div>
    
    <button class="connect" id="btnConnect" onclick="connectSerial()">🔌 Connect Robot via OTG</button>

    <div class="card">
        <h3>Live Signal Telemetry</h3>
        <div class="telemetry-grid">
            <div class="telemetry-block">
                <div class="label">Steering (A0)</div>
                <div class="val" id="lblLiveSteer">---</div>
            </div>
            <div class="telemetry-block">
                <div class="label">Throttle (A1)</div>
                <div class="val" id="lblLiveThrot">---</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>System Calibration</h3>
        <div id="console">System status: Offline.<br>Connect your OTG data cable to begin execution.</div>
        <button onclick="calibrateChannel('THR')">🎮 Calibrate Throttle Trigger</button>
        <button onclick="calibrateChannel('STR')">🎡 Calibrate Steering Wheel</button>
    </div>

    <div class="card">
        <h3>Motor Balance Tuning</h3>
        <div class="slider-group">
            <div class="slider-header">
                <span>Forward Left Bias</span>
                <span class="val" id="lblFBL">1.00</span>
            </div>
            <input type="range" min="0.70" max="1.00" step="0.01" value="1.00" id="slideFBL" oninput="updateBias('FBL', this.value)">
        </div>
        <div class="slider-group">
            <div class="slider-header">
                <span>Forward Right Bias</span>
                <span class="val" id="lblFBR">1.00</span>
            </div>
            <input type="range" min="0.70" max="1.00" step="0.01" value="1.00" id="slideFBR" oninput="updateBias('FBR', this.value)">
        </div>
        
        <div style="margin-top: 25px;">
            <button class="save" onclick="saveToEEPROM()">💾 Burn Changes Permanently (EEPROM)</button>
        </div>
    </div>

    <script>
        // Service Worker registration for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error:", err));
        }

        let port, writer, reader;
        let liveSteer = 1500, liveThrot = 1500;
        const textEncoder = new TextEncoder();

        // Establish connection via Web Serial API
        async function connectSerial() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                
                document.getElementById("btnConnect").innerText = "✅ Robot Connected";
                document.getElementById("btnConnect").style.background = "#34c759";
                document.getElementById("console").innerHTML = "Link Established successfully!<br>Polling telemetry streams...";
                
                startReadLoop();
                
                // Telemetry handshake loop (Requests live signal read every 150ms)
                setInterval(async () => {
                    if (writer) {
                        try { await writer.write(textEncoder.encode("R\n")); } catch(e){}
                    }
                }, 150);
            } catch (e) { 
                document.getElementById("console").innerText = "Connection Error: " + e.message; 
            }
        }

        // Asynchronous packet receiver engine
        async function startReadLoop() {
            const textDecoder = new TextDecoder();
            reader = port.readable.getReader();
            let buffer = "";
            
            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += textDecoder.decode(value);
                    let lines = buffer.split("\n");
                    buffer = lines.pop(); 
                    
                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith("DATA:")) {
                            let parts = line.replace("DATA:", "").split(",");
                            if (parts.length === 2) {
                                liveSteer = parseInt(parts[0]);
                                liveThrot = parseInt(parts[1]);
                                document.getElementById("lblLiveSteer").innerText = liveSteer + " μs";
                                document.getElementById("lblLiveThrot").innerText = liveThrot + " μs";
                            }
                        }
                    }
                }
            } catch (e) {
                document.getElementById("console").innerText = "Stream closed: " + e.message;
            } finally {
                reader.releaseLock();
            }
        }

        // Send slider modifications in real-time
        async function updateBias(key, val) {
            document.getElementById("lbl" + key).innerText = parseFloat(val).toFixed(2);
            if (writer) {
                await writer.write(textEncoder.encode(`${key}=${val}\n`));
            }
        }

        // Execute EEPROM flash write command
        async function saveToEEPROM() {
            if (!writer) { alert("Please connect your OTG link first!"); return; }
            await writer.write(textEncoder.encode("SAVE\n"));
            document.getElementById("console").innerHTML = "<span style='color: #ff9500;'>CRITICAL WRITE: Configurations locked permanently into EEPROM memory!</span>";
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // Interactive countdown calibration algorithm
        async function calibrateChannel(type) {
            if (!writer) { alert("Please connect your OTG link first!"); return; }
            let logger = document.getElementById("console");
            let name = (type === 'THR') ? "Throttle Trigger" : "Steering Wheel";
            
            // 1. NEUTRAL DETECTION PHASE
            logger.innerHTML = `[1/3] Keep ${name} at REST.<br>Capturing Neutral pocket in 3...`; await delay(1000);
            logger.innerHTML = `[1/3] Keep ${name} at REST.<br>Capturing Neutral pocket in 2...`; await delay(1000);
            logger.innerHTML = `[1/3] Keep ${name} at REST.<br>Capturing Neutral pocket in 1...`; await delay(1000);
            let neutral = (type === 'THR') ? liveThrot : liveSteer;
            logger.innerHTML = `Captured Center: ${neutral}μs.<br><span style='color: #ff9500;'>Next step starting instantly...</span>`;
            await delay(1500);

            // 2. MAXIMUM BOUND DETECTION PHASE
            logger.innerHTML = `[2/3] 👉 Pull/Turn ${name} to MAXIMUM!<br>Hold position firmly for 3...`; await delay(1000);
            logger.innerHTML = `[2/3] 👉 Pull/Turn ${name} to MAXIMUM!<br>Hold position firmly for 2...`; await delay(1000);
            logger.innerHTML = `[2/3] 👉 Pull/Turn ${name} to MAXIMUM!<br>Hold position firmly for 1...`; await delay(1000);
            let max = (type === 'THR') ? liveThrot : liveSteer;
            logger.innerHTML = `Captured Max: ${max}μs.<br><span style='color: #ff9500;'>Next step starting instantly...</span>`;
            await delay(1500);

            // 3. MINIMUM BOUND DETECTION PHASE
            logger.innerHTML = `[3/3] 👈 Push/Turn ${name} to MINIMUM!<br>Hold position firmly for 3...`; await delay(1000);
            logger.innerHTML = `[3/3] 👈 Push/Turn ${name} to MINIMUM!<br>Hold position firmly for 2...`; await delay(1000);
            logger.innerHTML = `[3/3] 👈 Push/Turn ${name} to MINIMUM!<br>Hold position firmly for 1...`; await delay(1000);
            let min = (type === 'THR') ? liveThrot : liveSteer;

            // Compile parameters into hardware layout mapping string
            let command = `SET_${type}=${min},${neutral},${max}\n`;
            await writer.write(textEncoder.encode(command));
            
            logger.innerHTML = `<span style='color: var(--accent-cyan);'>✅ ${name} Calibration Localized!</span><br>Min: ${min} | Neu: ${neutral} | Max: ${max}<br><i>Don't forget to press save below when completely finished!</i>`;
        }
    </script>
</body>
</html>
