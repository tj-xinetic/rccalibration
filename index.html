<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KROSYND PWA LINK</title>
    <style>
        :root { --neon-cyan: #00f3ff; --dark-bg: #0a0f1d; }
        body { background: var(--dark-bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .panel { border: 1px solid var(--neon-cyan); padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        h2 { border-bottom: 1px solid var(--neon-cyan); padding-bottom: 5px; color: var(--neon-cyan); text-align: center; margin-top: 0; }
        .control-group { margin: 15px 0; display: flex; flex-direction: column; background: #111a2e; padding: 10px; border-radius: 6px; }
        label { margin-bottom: 8px; font-weight: bold; font-size: 0.85em; letter-spacing: 1px; color: #aaa;}
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #1a233d; height: 10px; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--neon-cyan); border-radius: 50%; cursor: pointer; }
        button { background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); padding: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; width: 100%; border-radius: 5px; margin-bottom: 10px; }
        button:hover { background: var(--neon-cyan); color: #000; }
        .val-disp { font-family: monospace; color: var(--neon-cyan); float: right; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>URC10 // TACTICAL LINK</h2>
        <button id="connectBtn">CONNECT OTG LINK</button>
        
        <div class="control-group">
            <label>ACCELERATION RAMP <span id="rampVal" class="val-disp">25</span></label>
            <input type="range" min="5" max="255" value="25" oninput="updateParam('R', this.value, 'rampVal')">
        </div>
        
        <div class="control-group">
            <label>REVERSE BOOST (%) <span id="boostVal" class="val-disp">125</span></label>
            <input type="range" min="100" max="200" value="125" oninput="updateParam('B', this.value, 'boostVal')">
        </div>

        <div class="control-group">
            <label>FWD BIAS: LEFT (%) <span id="fblVal" class="val-disp">100</span></label>
            <input type="range" min="50" max="100" value="100" oninput="updateParam('FL', this.value, 'fblVal')">
        </div>

        <div class="control-group">
            <label>FWD BIAS: RIGHT (%) <span id="fbrVal" class="val-disp">100</span></label>
            <input type="range" min="50" max="100" value="100" oninput="updateParam('FR', this.value, 'fbrVal')">
        </div>

        <div class="control-group">
            <label>REV BIAS: LEFT (%) <span id="rblVal" class="val-disp">100</span></label>
            <input type="range" min="50" max="100" value="100" oninput="updateParam('RL', this.value, 'rblVal')">
        </div>

        <div class="control-group">
            <label>REV BIAS: RIGHT (%) <span id="rbrVal" class="val-disp">100</span></label>
            <input type="range" min="50" max="100" value="100" oninput="updateParam('RR', this.value, 'rbrVal')">
        </div>
    </div>

    <script>
        let port;
        let writer;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                writer = port.writable.getWriter();
                const btn = document.getElementById('connectBtn');
                btn.innerText = "LINK SECURED";
                btn.style.background = "#00f3ff";
                btn.style.color = "#000";
            } catch (err) {
                alert("OTG Link Failed: " + err);
            }
        });

        async function updateParam(command, value, displayId) {
            document.getElementById(displayId).innerText = value;
            if (writer) {
                const encoder = new TextEncoder();
                // Formats packet, e.g., "FL95\n" or "R50\n"
                const packet = `${command}${value}\n`;
                await writer.write(encoder.encode(packet));
            }
        }
    </script>
</body>
</html>
