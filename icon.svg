<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d19" />
      <stop offset="50%" stop-color="#111428" />
      <stop offset="100%" stop-color="#05060f" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5e00" />
      <stop offset="100%" stop-color="#ffbb00" />
    </linearGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="100%" stop-color="#00ffcc" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" stroke="#1a1f3c" stroke-width="4"/>

  <circle cx="256" cy="235" r="170" fill="none" stroke="#161b33" stroke-width="12" />
  <circle cx="256" cy="235" r="170" fill="none" stroke="url(#cyanGrad)" stroke-width="4" stroke-dasharray="15 8" opacity="0.8" />
  
  <path d="M 200,55 L 312,55 L 292,75 L 220,75 Z" fill="url(#accentGrad)" opacity="0.9" />

  <g filter="url(#glow)">
    <path d="M 140,130 L 372,130 L 372,165 L 276,165 L 276,310 L 236,310 L 236,165 L 140,165 Z" fill="url(#accentGrad)" />
    
    <path d="M 310,180 L 345,180 L 345,280 C 345,315 315,330 285,330 C 255,330 235,315 235,295 L 270,295 C 270,302 280,302 285,302 C 295,302 310,295 310,280 Z" fill="#ffffff" />
    
    <path d="M 160,200 L 205,200 L 256,265 L 307,200 L 352,200 L 285,285 L 355,370 L 310,370 L 256,305 L 202,370 L 157,370 L 227,285 Z" fill="url(#cyanGrad)" opacity="0.85" />
  </g>

  <circle cx="256" cy="235" r="4" fill="#ffbb00" />
  <line x1="256" y1="90" x2="256" y2="110" stroke="#ff5e00" stroke-width="3" opacity="0.5" />
  <line x1="256" y1="360" x2="256" y2="380" stroke="#ff5e00" stroke-width="3" opacity="0.5" />

  <line x1="120" y1="425" x2="392" y2="425" stroke="#1a1f3c" stroke-width="2" />

  <text x="256" y="460" 
        font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="28" 
        font-weight="900" 
        letter-spacing="6" 
        fill="#ffffff" 
        text-anchor="middle">
    TJ-XInetic
  </text>
  
  <text x="256" y="485" 
        font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="12" 
        font-weight="700" 
        letter-spacing="4" 
        fill="#00ffcc" 
        text-anchor="middle" opacity="0.8">
    SUMO CORE SYSTEMS
  </text>
</svg>
